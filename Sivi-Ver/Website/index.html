<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arduino Web Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="topbar">
  <h1>Arduino Web Dashboard</h1>
  <div class="status">
    <span id="simDot" class="dot" style="background:var(--muted)"></span>
    <span id="simText">Connecting…</span>
  </div>
</header>

<main class="container">

  <!-- SERVO CONTROL -->
  <section class="card">
    <h2>Servo Control</h2>
    <p>Angle: <span id="angleValue">—</span>°</p>
    <input id="angleSlider" type="range" min="0" max="180" value="90" step="1">
    <div class="servoArea">
      <div class="servoDial">
        <div id="servoArm" class="servoArm"></div>
        <div class="servoPivot"></div>
      </div>
      <p class="servoReadout">Angle: <span id="servoAngle">—</span>°</p>
    </div>
  </section>

  <!-- SENSOR STATUS -->
  <section class="card">
    <h2>IR Sensor Status</h2>
    <p>Object Detected: <span id="irDetected">—</span></p>
    <p class="small">IR Raw Value: <span id="irValue">—</span></p>
    <p class="small">Last updated: <span id="irTimestamp">—</span></p>
  </section>

</main>

<script type="module">

import { initializeApp }                   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase config ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyBlxLdiakI8Zv5gtRWtAcfwxTcW-XtGbTw",
  authDomain:        "sivi-arduino-database.firebaseapp.com",
  databaseURL:       "https://sivi-arduino-database-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "sivi-arduino-database",
  storageBucket:     "sivi-arduino-database.firebasestorage.app",
  messagingSenderId: "854752663108",
  appId:             "1:854752663108:web:b80bad680b96bb63478e11",
  measurementId:     "G-C1XE1J4ZJR"
};

const db = getDatabase(initializeApp(firebaseConfig));

// ── DOM refs ─────────────────────────────────────────────────────
const simDot      = document.getElementById("simDot");
const simText     = document.getElementById("simText");
const angleSlider = document.getElementById("angleSlider");
const angleValue  = document.getElementById("angleValue");
const servoArm    = document.getElementById("servoArm");
const servoAngle  = document.getElementById("servoAngle");
const irValue     = document.getElementById("irValue");
const irDetected  = document.getElementById("irDetected");
const irTimestamp = document.getElementById("irTimestamp");

// ── Helpers ───────────────────────────────────────────────────────
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

function setConnected(ok) {
  simDot.style.background = ok ? "var(--success)" : "var(--danger)";
  simText.innerText        = ok ? "Connected to ESP32" : "Disconnected";
}

function applyServoUI(angle) {
  const a = clamp(Number(angle), 0, 180);
  servoArm.style.transform = `translateX(-50%) rotate(${a - 90}deg)`;
  servoAngle.innerText     = a;
  angleSlider.value        = a;
  angleValue.innerText     = a;
}

// ── Listen: servo/angle (ESP32 confirms position back) ───────────
onValue(ref(db, "servo/angle"), snap => {
  const val = snap.val();
  if (val === null) return;
  setConnected(true);
  applyServoUI(val);
});

// ── Listen: IR sensor written by ESP32 ───────────────────────────
onValue(ref(db, "ir"), snap => {
  const data = snap.val();
  if (!data) return;

  irValue.innerText      = data.raw      ?? "—";
  irDetected.innerText   = data.detected  ? "YES" : "NO";
  irDetected.style.color = data.detected  ? "var(--danger)" : "var(--muted)";

  if (data.timestamp) {
    irTimestamp.innerText = new Date(data.timestamp).toLocaleTimeString();
  }
});

// ── Slider → write servo/angle to Firebase (ESP32 reads this) ────
let writeTimer = null;
angleSlider.addEventListener("input", () => {
  const angle = Number(angleSlider.value);
  angleValue.innerText = angle;
  applyServoUI(angle);

  // Debounce: only write after user stops dragging for 80 ms
  clearTimeout(writeTimer);
  writeTimer = setTimeout(() => {
    set(ref(db, "servo/angle"), angle)
      .catch(err => console.error("Firebase write error:", err));
  }, 80);
});

</script>

</body>
</html>
